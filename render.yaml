services:
  - type: web
    name: gambito-dama-cuantico
    env: python
    plan: free
    buildCommand: >-
      set -e ;
      pip install -r requirements.txt ;
      cd frontend && npm install && npm run build && cd .. ;
      cd engine/stockfish/src && make -j2 build ARCH=x86-64
    startCommand: python server.py
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: NODE_VERSION
        value: "20"
      # Obligatorias para multijugador online (configúralas en el dashboard de Render)
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
